name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: Install SQLite headers
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev
      # TestOpenAPISpecMatchesStructs runs as part of `go test ./...` and
      # fails the build at the first drift between api/v1/openapi.yaml
      # and internal/server wire-level structs.
      - run: go test -race ./...
      - run: go vet ./...

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: Install SQLite headers
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev
      - run: make build
      - run: make bench
